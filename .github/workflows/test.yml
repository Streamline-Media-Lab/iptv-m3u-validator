name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '17 6 * * 0'  # weekly sanity check

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile-check the script
        run: |
          python -m py_compile iptv_m3u_validator.py
      - name: Run --help (smoke)
        run: |
          python iptv_m3u_validator.py --help || true
